name: Update Claude Desktop

# Reads the latest version straight from Claude's macOS RELEASES.json
# (the same manifest the app's own auto-updater uses), repins the flake,
# runs a real `nix build` so the patch-verification step actually gates
# the update, then opens an auto-merging PR.

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (optional; auto-detected from RELEASES.json otherwise)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine latest version
      id: check
      run: |
        set -euo pipefail

        CURRENT=$(grep -oP 'version = "\K[^"]+' pkgs/claude-desktop.nix | head -1)
        echo "Current version: $CURRENT"

        RELEASES_URL="https://downloads.claude.ai/releases/darwin/universal/RELEASES.json"

        if [ -n "${{ inputs.version }}" ]; then
          LATEST="${{ inputs.version }}"
          echo "Forced version: $LATEST"
        else
          LATEST=$(curl -fsSL "$RELEASES_URL" | jq -r '.currentRelease')
          echo "Latest version (RELEASES.json): $LATEST"
        fi

        if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
          echo "::error::Could not read latest version from RELEASES.json"
          exit 1
        fi

        # The release manifest points at a .zip; the flake fetches the .dmg
        # at the same path. The per-release filename hash is shared between
        # them, so derive it from whichever artifact the manifest lists.
        ARTIFACT_URL=$(curl -fsSL "$RELEASES_URL" \
          | jq -r --arg v "$LATEST" \
            '.releases[] | select(.updateTo.version == $v) | .updateTo.url' \
          | head -1)
        # Fall back to the current release's url if the per-version lookup misses.
        if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
          ARTIFACT_URL=$(curl -fsSL "$RELEASES_URL" | jq -r '.releases[0].updateTo.url')
        fi

        FNAME=$(basename "$ARTIFACT_URL")          # Claude-<hash>.zip
        FHASH=${FNAME#Claude-}
        FHASH=${FHASH%.*}                          # strip .zip / .dmg
        DMG_URL="https://downloads.claude.ai/releases/darwin/universal/${LATEST}/Claude-${FHASH}.dmg"

        echo "Filename hash: $FHASH"
        echo "DMG URL: $DMG_URL"

        echo "current=$CURRENT"   >> "$GITHUB_OUTPUT"
        echo "latest=$LATEST"     >> "$GITHUB_OUTPUT"
        echo "fhash=$FHASH"       >> "$GITHUB_OUTPUT"
        echo "dmg_url=$DMG_URL"   >> "$GITHUB_OUTPUT"
        if [ "$CURRENT" != "$LATEST" ]; then
          echo "needs_update=true" >> "$GITHUB_OUTPUT"
        else
          echo "needs_update=false" >> "$GITHUB_OUTPUT"
          echo "Already on the latest version."
        fi

    - name: Install Nix
      if: steps.check.outputs.needs_update == 'true'
      uses: DeterminateSystems/nix-installer-action@v14

    - name: Setup Nix cache
      if: steps.check.outputs.needs_update == 'true'
      uses: DeterminateSystems/magic-nix-cache-action@v7

    - name: Repin flake (version, filename hash, sha256)
      if: steps.check.outputs.needs_update == 'true'
      run: |
        set -euo pipefail
        LATEST="${{ steps.check.outputs.latest }}"
        FHASH="${{ steps.check.outputs.fhash }}"
        DMG_URL="${{ steps.check.outputs.dmg_url }}"

        # SRI hash straight from the store prefetcher — no hex/base64 dance.
        SRI=$(nix store prefetch-file --json "$DMG_URL" | jq -r '.hash')
        echo "SRI: $SRI"

        sed -i "s/version = \"[^\"]*\"/version = \"${LATEST}\"/" pkgs/claude-desktop.nix
        sed -i "s|/Claude-[^\"]*\.dmg\"|/Claude-${FHASH}.dmg\"|" pkgs/claude-desktop.nix
        sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${SRI}\"|" pkgs/claude-desktop.nix

        echo "--- Repinned srcDmg ---"
        grep -A3 'srcDmg = fetchurl' pkgs/claude-desktop.nix

    - name: Build (exercises patch verification)
      if: steps.check.outputs.needs_update == 'true'
      run: |
        # A real build is the gate: pkgs/claude-desktop.nix fails the build
        # if any perl patch stops matching the new minified bundle, so a
        # green build here means the patch set still applies to this version.
        NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --impure -L

    - name: Create Pull Request
      if: steps.check.outputs.needs_update == 'true'
      id: pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: |
          feat: update Claude Desktop to version ${{ steps.check.outputs.latest }}

          Automated update from RELEASES.json. Build (incl. patch verification) passed.
        title: 'Update Claude Desktop to version ${{ steps.check.outputs.latest }}'
        body: |
          ## Summary
          - Bumps Claude Desktop ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}
          - Version detected from Claude's macOS `RELEASES.json`
          - DMG sha256 repinned via `nix store prefetch-file`
          - `nix build .#claude-desktop` passed, so the patch set still applies to this version

          🤖 Automated by the update-claude-desktop workflow.
        branch: update-claude-desktop-${{ steps.check.outputs.latest }}
        delete-branch: true

    - name: Enable auto-merge
      if: steps.pr.outputs.pull-request-number
      run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --merge --delete-branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
