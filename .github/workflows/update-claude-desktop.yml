name: Update Claude Desktop

# Reads the latest version from Anthropic's official apt repository Packages
# index (the same metadata `apt upgrade` trusts), repins the flake's version
# and per-arch deb hashes from the index's SHA256 fields, runs a real
# `nix build` (which re-verifies the amd64 hash against the actual download),
# then opens an auto-merging PR.

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Mondays 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (optional; auto-detected from the apt Packages index otherwise)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  APT_DIST: https://downloads.claude.ai/claude-desktop/apt/stable/dists/stable

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Determine latest version
      id: check
      run: |
        set -euo pipefail

        CURRENT=$(grep -oP 'version = "\K[^"]+' pkgs/claude-desktop.nix | head -1)
        echo "Current version: $CURRENT"

        if [ -n "${{ inputs.version }}" ]; then
          LATEST="${{ inputs.version }}"
          echo "Forced version: $LATEST"
        else
          LATEST=$(curl -fsSL "$APT_DIST/main/binary-amd64/Packages" \
            | grep -oP '^Version: \K.*' | sort -V | tail -1)
          echo "Latest version (apt Packages index): $LATEST"
        fi

        if [ -z "$LATEST" ]; then
          echo "::error::Could not read latest version from the apt Packages index"
          exit 1
        fi

        echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
        echo "latest=$LATEST"   >> "$GITHUB_OUTPUT"
        if [ "$CURRENT" != "$LATEST" ]; then
          echo "needs_update=true" >> "$GITHUB_OUTPUT"
        else
          echo "needs_update=false" >> "$GITHUB_OUTPUT"
          echo "Already on the latest version."
        fi

    - name: Install Nix
      if: steps.check.outputs.needs_update == 'true'
      uses: DeterminateSystems/nix-installer-action@v14

    - name: Setup Nix cache
      if: steps.check.outputs.needs_update == 'true'
      uses: DeterminateSystems/magic-nix-cache-action@v7

    - name: Repin flake (version + per-arch deb hashes)
      if: steps.check.outputs.needs_update == 'true'
      run: |
        set -euo pipefail
        LATEST="${{ steps.check.outputs.latest }}"

        # Pull each arch's deb SHA256 from its Packages stanza and convert to
        # SRI. The index is the same data apt itself trusts (signed InRelease);
        # the amd64 hash is additionally verified by the nix build below when
        # fetchurl downloads the real deb.
        sha_for_arch() {
          curl -fsSL "$APT_DIST/main/binary-$1/Packages" \
            | awk -v ver="$LATEST" '
                BEGIN { RS=""; FS="\n" }
                {
                  v=""; s=""
                  for (i = 1; i <= NF; i++) {
                    if ($i ~ /^Version: /) v = substr($i, 10)
                    if ($i ~ /^SHA256: /)  s = substr($i, 9)
                  }
                  if (v == ver) print s
                }' \
            | head -1
        }

        for arch in amd64 arm64; do
          SHA=$(sha_for_arch "$arch")
          if [ -z "$SHA" ]; then
            echo "::error::No $arch Packages stanza for version $LATEST"
            exit 1
          fi
          SRI=$(nix hash convert --hash-algo sha256 --to sri "$SHA")
          echo "$arch: $SRI"
          # Each fetchurl's url line (…_<arch>.deb") is immediately followed
          # by its hash line; scope the substitution to that line.
          sed -i "/_$arch.deb\";/{n;s|hash = \"sha256-[^\"]*\"|hash = \"$SRI\"|}" \
            pkgs/claude-desktop.nix
        done

        sed -i "s/version = \"[^\"]*\"/version = \"$LATEST\"/" pkgs/claude-desktop.nix

        echo "--- Repinned srcs ---"
        grep -A9 'srcs = {' pkgs/claude-desktop.nix

    - name: Build
      if: steps.check.outputs.needs_update == 'true'
      run: |
        # A real build is the gate: fetchurl re-verifies the amd64 deb hash
        # against the actual download, and autoPatchelfHook fails the build
        # if the new release grew a dependency we don't provide.
        NIXPKGS_ALLOW_UNFREE=1 nix build .#claude-desktop --impure -L

    - name: Create Pull Request
      if: steps.check.outputs.needs_update == 'true'
      id: pr
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: |
          feat: update Claude Desktop to version ${{ steps.check.outputs.latest }}

          Automated update from the Anthropic apt repository. Build passed.
        title: 'Update Claude Desktop to version ${{ steps.check.outputs.latest }}'
        body: |
          ## Summary
          - Bumps Claude Desktop ${{ steps.check.outputs.current }} → ${{ steps.check.outputs.latest }}
          - Version detected from Anthropic's apt `Packages` index
          - amd64 + arm64 deb hashes repinned from the index's SHA256 fields
          - `nix build .#claude-desktop` passed (fetchurl re-verified the amd64 hash; autoPatchelf found all dependencies)

          🤖 Automated by the update-claude-desktop workflow.
        branch: update-claude-desktop-${{ steps.check.outputs.latest }}
        delete-branch: true

    - name: Enable auto-merge
      if: steps.pr.outputs.pull-request-number
      run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --merge --delete-branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
